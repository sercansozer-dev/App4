<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Point Cloud Viewer</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #000;
            color: white;
            font-family: sans-serif;
        }

        canvas {
            display: block;
            width: 100vw;
            height: 100vh;
        }

        #info {
            position: absolute;
            top: 10px;
            left: 10px;
            z-index: 100;
            pointer-events: none;
            background: rgba(0, 0, 0, 0.8);
            padding: 15px;
            border-radius: 8px;
            border-left: 4px solid #00A4EF;
            font-size: 12px;
        }

        #loading {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 20px;
            color: #3498db;
            background: rgba(0, 0, 0, 0.8);
            padding: 30px;
            border-radius: 8px;
            display: none;
        }

        #error {
            position: absolute;
            bottom: 20px;
            left: 20px;
            background: rgba(220, 53, 69, 0.8);
            color: white;
            padding: 12px 15px;
            border-radius: 5px;
            font-size: 12px;
            max-width: 400px;
            display: none;
            border-left: 4px solid #dc3545;
        }

        #status {
            position: absolute;
            bottom: 20px;
            right: 20px;
            background: rgba(0, 0, 0, 0.7);
            padding: 10px 15px;
            border-radius: 5px;
            font-size: 11px;
            color: #4CAF50;
        }
    </style>
    <!-- Three.js CDN -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <!-- OrbitControls CDN -->
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    <!-- GLTFLoader CDN (Three.js r128 compatible) -->
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>
</head>
<body>
    <div id="info">
        <div>🎥 3D Viewer (GLB & Point Cloud)</div>
        <div id="pointCount">Bekleniyor...</div>
    </div>
    <div id="loading">⏳ Veriler işleniyor...</div>
    <div id="error"></div>
    <div id="status">Başlatılıyor...</div>

    <script>
        let scene, camera, renderer, controls, pointsMesh;
        const statusEl = document.getElementById('status');
        const errorEl = document.getElementById('error');
        const loadingEl = document.getElementById('loading');

        // Global error handler
        window.addEventListener('error', function (event) {
            console.error('❌ JavaScript Hatası:', event.error);
            updateError(`JS Hatası: ${event.error?.message || 'Bilinmeyen hata'}`);
        });

        function updateStatus(message) {
            statusEl.textContent = message;
            console.log(`[STATUS] ${message}`);
        }

        function updateError(message) {
            errorEl.textContent = `❌ ${message}`;
            errorEl.style.display = 'block';
            console.error(`[ERROR] ${message}`);
        }

        function clearError() {
            errorEl.style.display = 'none';
        }

        function showLoading(show = true) {
            loadingEl.style.display = show ? 'block' : 'none';
        }

        function initPointCloudViewer() {
            try {
                console.log('🟢 initPointCloudViewer çağrıldı');
                updateStatus("🔧 Viewer başlatılıyor...");
                clearError();

                // Sahne Kurulumu
                scene = new THREE.Scene();
                scene.background = new THREE.Color(0x111111);

                // Kamera
                camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 10000);
                camera.position.set(0, -200, 400);
                camera.up.set(0, 0, 1);

                // Renderer
                renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
                renderer.setSize(window.innerWidth, window.innerHeight);
                renderer.setPixelRatio(window.devicePixelRatio);
                document.body.appendChild(renderer.domElement);

                // OrbitControls
                if (typeof THREE.OrbitControls !== 'undefined') {
                    controls = new THREE.OrbitControls(camera, renderer.domElement);
                    controls.enableDamping = true;
                    controls.dampingFactor = 0.05;
                    updateStatus("✓ OrbitControls yüklendi");
                } else {
                    updateError('OrbitControls bulunamadı');
                }

                // Işık
                const ambientLight = new THREE.AmbientLight(0xffffff, 0.6);
                scene.add(ambientLight);

                const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
                dirLight.position.set(100, 100, 100);
                scene.add(dirLight);

                const dirLight2 = new THREE.DirectionalLight(0xffffff, 0.5);
                dirLight2.position.set(-100, -100, 50);
                scene.add(dirLight2);

                // Eksenler
                const axesHelper = new THREE.AxesHelper(100);
                scene.add(axesHelper);

                // Pencere Resize
                window.addEventListener('resize', onWindowResize, false);

                // Animasyon
                animate();

                updateStatus("✓ Viewer başlatıldı");
                console.log("✓ Point Cloud Viewer hazır!");
                return "Viewer Ready";
            } catch (error) {
                console.error("❌ Viewer başlatma hatası:", error);
                updateError(`Viewer hatası: ${error.message}`);
                return "Error: " + error.message;
            }
        }

        function loadPointCloud(jsonData) {
            try {
                console.log('🟢 loadPointCloud çağrıldı', jsonData);
                updateStatus("📊 Point Cloud yükleniyor...");
                clearError();
                showLoading(true);

                // Eski mesh temizle
                if (pointsMesh) {
                    scene.remove(pointsMesh);
                    pointsMesh.geometry.dispose();
                    pointsMesh.material.dispose();
                }

                if (!jsonData || !jsonData.points || jsonData.points.length === 0) {
                    throw new Error('Geçersiz JSON verisi');
                }

                const geometry = new THREE.BufferGeometry();
                const points = jsonData.points;
                const count = points.length;

                const positions = new Float32Array(count * 3);
                const colors = new Float32Array(count * 3);

                // Min/Max Z bulma
                let minZ = Infinity;
                let maxZ = -Infinity;

                for (let i = 0; i < count; i++) {
                    if (points[i].z < minZ) minZ = points[i].z;
                    if (points[i].z > maxZ) maxZ = points[i].z;
                }

                const zRange = maxZ - minZ || 1;

                // Veri doldurma
                for (let i = 0; i < count; i++) {
                    const p = points[i];
                    positions[i * 3] = p.x;
                    positions[i * 3 + 1] = p.y;
                    positions[i * 3 + 2] = p.z;

                    const normalizedZ = (p.z - minZ) / zRange;
                    const color = new THREE.Color();
                    color.setHSL((1.0 - normalizedZ) * 0.7, 1.0, 0.5);

                    colors[i * 3] = color.r;
                    colors[i * 3 + 1] = color.g;
                    colors[i * 3 + 2] = color.b;
                }

                geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
                geometry.setAttribute('color', new THREE.BufferAttribute(colors, 3));

                // Materyal
                const material = new THREE.PointsMaterial({
                    size: 2,
                    vertexColors: true,
                    sizeAttenuation: false
                });

                pointsMesh = new THREE.Points(geometry, material);

                // Mesh merkez
                geometry.computeBoundingBox();
                const center = new THREE.Vector3();
                geometry.boundingBox.getCenter(center);
                pointsMesh.position.sub(center);

                scene.add(pointsMesh);

                // Kamera konumla
                if (controls) {
                    controls.reset();
                }

                const metadata = jsonData.metadata || {};
                const width = metadata.width || 100;
                const length = metadata.length || 100;

                camera.position.set(0, -Math.max(width, length) * 0.8, 400);
                camera.lookAt(0, 0, 0);

                showLoading(false);
                document.getElementById('pointCount').textContent =
                    `Noktalar: ${count.toLocaleString()} | Min Z: ${minZ.toFixed(2)} | Max Z: ${maxZ.toFixed(2)}`;

                updateStatus(`✓ ${count.toLocaleString()} nokta yüklendi`);
                console.log(`✓ Points loaded: ${count}`);

                return "Points Loaded: " + count;

            } catch (err) {
                console.error("❌ Point Cloud Hatası:", err);
                updateError(`Yükleme hatası: ${err.message}`);
                showLoading(false);
                return "Error: " + err.message;
            }
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        function animate() {
            requestAnimationFrame(animate);
            if (controls) controls.update();
            renderer.render(scene, camera);
        }

        // Sayfa yüklendiğinde otomatik başlat
        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', function () {
                initPointCloudViewer();
            });
        } else {
            initPointCloudViewer();
        }

        // Global fonksiyonlar
        window.initPointCloudViewer = initPointCloudViewer;
        window.loadPointCloud = loadPointCloud;
        window.loadModel = loadModel; // Dışarıdan erişim için

        function loadModel(url) {
            try {
                console.log('🟢 loadModel çağrıldı', url);
                updateStatus("📦 Model yükleniyor: " + url);
                clearError();
                showLoading(true);

                // Temizlik
                if (window.currentModel) {
                     scene.remove(window.currentModel);
                     // Derinlemesine dispose gerekebilir ama şimdilik scene remove yeterli
                     window.currentModel = null;
                }
                if (pointsMesh) {
                    scene.remove(pointsMesh);
                    pointsMesh.geometry.dispose();
                    pointsMesh.material.dispose();
                    pointsMesh = null;
                }

                // GLTFLoader kontrolü
                if (typeof THREE.GLTFLoader === 'undefined') {
                    throw new Error("GLTFLoader yüklenemedi. İnternet bağlantısını kontrol edin.");
                }

                const loader = new THREE.GLTFLoader();
                loader.load(url, function (gltf) {
                    const model = gltf.scene;
                    window.currentModel = model;

                    scene.add(model);

                    // Bounding Box ve Kamera Otomatik Ayarı
                    const box = new THREE.Box3().setFromObject(model);
                    const center = box.getCenter(new THREE.Vector3());
                    const size = box.getSize(new THREE.Vector3());

                    // Modeli orijine taşı
                    model.position.x += (model.position.x - center.x);
                    model.position.y += (model.position.y - center.y);
                    model.position.z += (model.position.z - center.z);
                    
                    // Kamera mesafesi ayarla
                    const maxDim = Math.max(size.x, size.y, size.z);
                    const fov = camera.fov * (Math.PI / 180);
                    let cameraZ = Math.abs(maxDim / 2 * Math.tan(fov * 2));
                    cameraZ *= 2.0; // Biraz pay bırak
                    
                    camera.position.set(cameraZ, cameraZ, cameraZ); // İzometrik gibi
                    camera.lookAt(0, 0, 0);
                    
                    if(controls) {
                        controls.target.set(0,0,0);
                        controls.update();
                    }

                    showLoading(false);
                    updateStatus("✓ Model başarıyla yüklendi");
                    document.getElementById('pointCount').textContent = `Model: ${url.split('/').pop()}`;

                }, 
                function (xhr) {
                    if (xhr.lengthComputable) {
                        const percent = (xhr.loaded / xhr.total) * 100;
                        updateStatus(`Yükleniyor: %${percent.toFixed(0)}`);
                    }
                },
                function (error) {
                    console.error("GLTF Load Error:", error);
                    updateError("Model yüklenemedi: " + (error.message || "Bilinmeyen Hata"));
                    showLoading(false);
                });

            } catch(e) {
                console.error("loadModel exception:", e);
                updateError("Hata: " + e.message);
                showLoading(false);
            }
        }

        console.log('✓ HTML script yüklendi ve hazır');
    </script>
</body>
</html>
