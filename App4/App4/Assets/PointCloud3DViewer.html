<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Point Cloud Viewer</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #000;
            color: white;
            font-family: sans-serif;
        }

        canvas {
            display: block;
            width: 100vw;
            height: 100vh;
        }

        #info {
            display: none; /* Gizle */
            position: absolute;
            top: 10px;
            left: 10px;
            z-index: 100;
            pointer-events: none;
            background: rgba(0, 0, 0, 0.7);
            padding: 15px;
            border-radius: 8px;
            border-left: 4px solid #00A4EF;
        }

        #loading {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 24px;
            color: #3498db;
            background: rgba(0, 0, 0, 0.8);
            padding: 30px 50px;
            border-radius: 8px;
        }

        #status {
            display: none; /* Gizle */
            position: absolute;
            bottom: 20px;
            left: 20px;
            background: rgba(0, 0, 0, 0.7);
            padding: 10px 15px;
            border-radius: 5px;
            font-size: 12px;
            color: #4CAF50;
        }
    </style>
    <!-- Three.js CDN -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <!-- OrbitControls CDN -->
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
</head>
<body>
    <div id="info">
        <div>🎥 3D Point Cloud Viewer</div>
        <div id="pointCount" style="font-size: 11px; color: #999; margin-top: 8px;">Bekleniyor...</div>
    </div>
    <div id="loading" style="display:none;">⏳ Veriler işleniyor...</div>
    <div id="status">Hazırlanıyor...</div>

    <script>
        let scene, camera, renderer, controls, pointsMesh;
        const statusEl = document.getElementById('status');

        function updateStatus(message) {
            statusEl.textContent = message;
            console.log(`[STATUS] ${message}`);
        }

        function initPointCloudViewer() {
            try {
                updateStatus("🔧 Viewer başlatılıyor...");

                // Sahne Kurulumu
                scene = new THREE.Scene();
                scene.background = new THREE.Color(0x111111);

                // Kamera - Daha yakında ve Z ekseni boyunca bakacak şekilde
                camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 100000);
                camera.position.set(0, 0, 35); // Z ekseninden bakıyor - ÇOK daha yakın (50'den 35'e)
                camera.up.set(0, 1, 0); // Y ekseni yukarı

                // Renderer
                renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
                renderer.setSize(window.innerWidth, window.innerHeight);
                renderer.setPixelRatio(window.devicePixelRatio);
                document.body.appendChild(renderer.domElement);

                // Kontroller (OrbitControls)
                if (typeof THREE.OrbitControls !== 'undefined') {
                    controls = new THREE.OrbitControls(camera, renderer.domElement);
                    controls.enableDamping = true;
                    controls.dampingFactor = 0.05;
                    controls.autoRotate = false;
                    controls.target.set(0, 0, 0); // Hedef noktayı merkeze ayarla
                    updateStatus("✓ OrbitControls yüklendi");
                } else {
                    updateStatus("⚠ OrbitControls bulunamadı");
                }

                // Işıklandırma
                const ambientLight = new THREE.AmbientLight(0xffffff, 0.6);
                scene.add(ambientLight);
                
                const directionalLight = new THREE.DirectionalLight(0xffffff, 0.5);
                directionalLight.position.set(100, 100, 100);
                scene.add(directionalLight);

                // Eksenler (Z = Kırmızı)
                const axesHelper = new THREE.AxesHelper(50);
                scene.add(axesHelper);

                // Pencere Boyutlandırma
                window.addEventListener('resize', onWindowResize, false);

                // Animasyon Döngüsü
                animate();

                updateStatus("✓ Viewer başlatıldı");
                console.log("✓ Point Cloud Viewer initialized successfully!");
                return "Viewer Ready";
            } catch (error) {
                console.error("❌ Viewer başlatma hatası:", error);
                updateStatus(`❌ Başlatma hatası: ${error.message}`);
                return "Error: " + error.message;
            }
        }

        function loadPointCloud(jsonData) {
            try {
                updateStatus("📊 Point Cloud yükleniyor...");
                document.getElementById('loading').style.display = 'block';

                // Eğer eski bir mesh varsa temizle
                if (pointsMesh) {
                    scene.remove(pointsMesh);
                    pointsMesh.geometry.dispose();
                    pointsMesh.material.dispose();
                }

                if (!jsonData || !jsonData.points || jsonData.points.length === 0) {
                    console.error("❌ No point data found");
                    updateStatus("❌ Veri bulunamadı");
                    return "No Data";
                }

                const geometry = new THREE.BufferGeometry();
                const points = jsonData.points;
                const count = points.length;

                const positions = new Float32Array(count * 3);
                const colors = new Float32Array(count * 3);

                // Normalizasyon için min/max bulma
                let minZ = Infinity;
                let maxZ = -Infinity;

                for (let i = 0; i < count; i++) {
                    if (points[i].z < minZ) minZ = points[i].z;
                    if (points[i].z > maxZ) maxZ = points[i].z;
                }

                const zRange = maxZ - minZ || 1;

                // Veriyi doldur
                for (let i = 0; i < count; i++) {
                    const p = points[i];

                    // Pozisyon verisi
                    positions[i * 3] = p.x;
                    positions[i * 3 + 1] = p.y;
                    positions[i * 3 + 2] = p.z;

                    // Renklendirme (Z yüksekliğine göre Heatmap: Kırmızı = Yakın/Yüksek, Mavi = Uzak/Düşük)
                    const normalizedZ = (p.z - minZ) / zRange;
                    const color = new THREE.Color();
                    // HSL: H=(normalizedZ)*0.7 => Yüksek Z = Düşük H değeri = Kırmızı, Düşük Z = Yüksek H değeri = Mavi
                    color.setHSL(normalizedZ * 0.7, 1.0, 0.5);

                    colors[i * 3] = color.r;
                    colors[i * 3 + 1] = color.g;
                    colors[i * 3 + 2] = color.b;
                }

                geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
                geometry.setAttribute('color', new THREE.BufferAttribute(colors, 3));

                // Materyal oluştur
                const material = new THREE.PointsMaterial({
                    size: 5, // Daha büyük noktalar (önceden 3.5)
                    vertexColors: true,
                    sizeAttenuation: false
                });

                pointsMesh = new THREE.Points(geometry, material);

                // Mesh'i ortala
                geometry.computeBoundingBox();
                const center = new THREE.Vector3();
                geometry.boundingBox.getCenter(center);
                pointsMesh.position.sub(center);

                scene.add(pointsMesh);

                // Kamerayı odakla
                if (controls) {
                    controls.reset();
                    controls.target.set(0, 0, 0);
                }

                const metadata = jsonData.metadata || {};
                const width = metadata.width || 100;
                const length = metadata.length || 100;

                // Kamera konumunu veri boyutuna göre ayarla
                // Z ekseni boyunca bakıyor (kırmızı taraf ön plana)
                const maxDim = Math.max(width, length);
                const distance = maxDim * 0.08; // 0.08'e indirdi (çok yakın zoom - 0.15'ten azaldı)
                camera.position.set(0, 0, distance);
                camera.lookAt(0, 0, 0);

                // Controls target'ı güncelle
                if (controls) {
                    controls.target.set(0, 0, 0);
                    controls.update();
                }

                document.getElementById('loading').style.display = 'none';
                document.getElementById('pointCount').textContent = `Noktalar: ${count.toLocaleString()} | Min Z: ${minZ.toFixed(2)} | Max Z: ${maxZ.toFixed(2)}`;

                updateStatus(`✓ ${count.toLocaleString()} nokta yüklendi`);
                console.log(`✓ Points loaded: ${count}`);

                return "Points Loaded: " + count;

            } catch (err) {
                console.error("❌ Point Cloud Yükleme Hatası:", err);
                updateStatus(`❌ Hata: ${err.message}`);
                return "Error: " + err.message;
            }
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        function animate() {
            requestAnimationFrame(animate);
            if (controls) controls.update();
            renderer.render(scene, camera);
        }

        // Sayfa yüklendiğinde otomatik başlat
        window.addEventListener('DOMContentLoaded', function () {
            initPointCloudViewer();
        });

        // .NET'ten çağrılabilir hale getir
        window.initPointCloudViewer = initPointCloudViewer;
        window.loadPointCloud = loadPointCloud;
    </script>
</body>
</html>
